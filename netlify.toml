# Netlify config — static site, no build step.
# Pretty URLs: every page lives at /folder/index.html so the URL is /folder/.

[build]
  publish = "."

# Force trailing-slash form for cleaner URLs.
[[redirects]]
  from = "/about"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/services"
  to = "/services/"
  status = 301

[[redirects]]
  from = "/gallery"
  to = "/gallery/"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/contact/"
  status = 301

# Security + performance headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# CSS and JS use stable filenames (no content hash), so they MUST revalidate
# on every request — otherwise updates are invisible to returning visitors
# for the entire max-age window. Browsers will keep the file cached but
# always check the ETag (cheap), and only re-download on actual change.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Photos and other assets keep aggressive caching since their content
# rarely changes for a given filename. Drop "immutable" so we still have
# an escape hatch (long cache but not "never check"); content updates
# should rename the file anyway.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, must-revalidate"
